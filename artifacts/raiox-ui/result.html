<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Raio-X Digital — AHI</title>
    <meta name="description" content="O teu raio-x digital — uma leitura curta da tua presença online." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="page-result">
    <!-- WAITING VIEW — 3×3 tile grid lights up as evidence arrives -->
    <section id="view-waiting" class="view view-waiting" aria-live="polite" aria-busy="true">
      <header class="result-top">
        <span id="wait-shop-name" class="shop-pin">A tua loja</span>
      </header>
      <p id="result-status" class="result-status">A descobrir-te peça a peça…</p>

      <div id="tile-grid" class="tile-grid" aria-hidden="true"></div>

      <div id="fact-stack" class="fact-stack" aria-live="polite"></div>

      <div class="progress-track" aria-hidden="true">
        <div id="progress-bar" class="progress-bar" style="width:6%"></div>
      </div>
      <p id="progress-line" class="progress-line">A começar…</p>
      <p id="activity-line" class="activity-line" aria-live="polite" aria-atomic="true"></p>
      <p id="net-line" class="net-line" hidden>Sem rede — vou tentar de novo.</p>

      <form id="wait-email-form" class="email-capture" novalidate>
        <label class="email-capture-label" for="wait-email-input">Recebe o resultado por email quando ficar pronto.</label>
        <div class="email-capture-row">
          <input id="wait-email-input" class="email-capture-input" type="email" inputmode="email" autocomplete="email" placeholder="o-teu-email@exemplo.pt" required />
          <button id="wait-email-submit" class="btn btn-secondary email-capture-submit" type="submit">Quero receber</button>
        </div>
        <p id="wait-email-msg" class="email-capture-msg" aria-live="polite"></p>
        <p class="email-capture-foot">Só usamos para te enviar este resultado.</p>
      </form>

      <footer class="ahi-footer">— AHI · Fórum do Comércio do Porto</footer>
    </section>

    <!-- ERROR / TIMEOUT VIEW -->
    <section id="view-error" class="view view-error" hidden>
      <div class="error-box">
        <p id="error-message" class="error-message">Algo correu mal — tenta de novo daqui a uns segundos.</p>
        <div class="error-actions">
          <button id="error-retry" type="button" class="btn" hidden>Recomeçar</button>
        </div>
      </div>
    </section>

    <!-- REVEAL VIEW -->
    <section id="view-reveal" class="view view-reveal" hidden>
      <header class="reveal-top">
        <ol id="reveal-dots" class="reveal-dots" aria-label="Progresso da revelação"></ol>
      </header>

      <div id="scene-host" class="scene-host"></div>

      <button id="scene-back" type="button" class="scene-back" aria-label="Cena anterior" hidden>← voltar</button>
      <button id="scene-skip" type="button" class="scene-skip" aria-label="Avançar cena">avançar →</button>

      <a class="restart-link" href="/">Esta análise não bate certo? Recomeça aqui.</a>
    </section>

    <script type="module" src="/js/result.js"></script>
  </body>
</html>
