kind = "web"
previewPath = "/"
title = "Raio-X Digital"
version = "1.0.0"
id = "artifacts/raiox-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19272

[services.development]
run = "pnpm --filter @workspace/raiox-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raiox-ui", "run", "build" ]
publicDir = "artifacts/raiox-ui/dist/public"
serve = "static"

# Per brief: /r/:sid is server-rendered by the API team and injects window.__INITIAL_DATA__
# into result.html. Until that endpoint ships, route the share path to result.html so the
# client-side hydration in result.js (which detects the /r/ prefix from window.location)
# can take over. All real files (/, /result.html, /privacidade.html, /css/*, /js/*) are
# served first, so no SPA fallback is needed for the merchant flow.
[[services.production.rewrites]]
from = "/r/*"
to = "/result.html"

[services.env]
PORT = "19272"
BASE_PATH = "/"
